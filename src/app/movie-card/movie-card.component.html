<div class="card-container">
  <div *ngIf="filteredMovies.length === 0" class="no-results-message" data-testid="no-results">
    <mat-icon class="no-results-icon">search_off</mat-icon>
    <h2>No records found</h2>
    <p>
      <span *ngIf="searchTerm">
        No movies match "<strong>{{ searchTerm }}</strong>"
      </span>
      <span *ngIf="searchTerm && selectedGenre"> in the </span>
      <span *ngIf="selectedGenre">
        <strong>{{ selectedGenre }}</strong> genre
      </span>
      <span *ngIf="!searchTerm && !selectedGenre">
        Try adjusting your search criteria
      </span>
    </p>
  </div>

  <mat-card *ngFor="let movie of paginatedMovies" class="movie-card" [attr.data-testid]="'movie-'+movie._id">
    <img
      [src]="movie.ImagePath"
      [alt]="movie.Title"
      class="movie-image"
      (click)="openSynopsis(movie)"
    />
    <div class="movie-details">
      <h3 class="movie-title">{{ movie.Title }}</h3>
      <h4>Genre: {{ movie.Genre.Name }}</h4>

      <mat-card-actions class="button-container">
        <button
          mat-icon-button
          (click)="openSynopsis(movie)"
          color="secondary"
          matTooltip="Info"
        >
          <mat-icon>info</mat-icon>
        </button>

        <button
          *ngIf="!isFavorite(movie._id)"
          mat-icon-button
          (click)="addFavorite(movie._id)"
          color="accent"
          matTooltip="Add to favorites"
        >
          <mat-icon>favorite_border</mat-icon>
        </button>

        <button
          *ngIf="isFavorite(movie._id)"
          mat-icon-button
          (click)="removeFavorite(movie._id)"
          color="accent"
          matTooltip="Remove from favorites"
        >
          <mat-icon>favorite</mat-icon>
        </button>
      </mat-card-actions>
    </div>
  </mat-card>
</div>

<div class="pagination-controls" data-testid="pagination" *ngIf="filteredMovies.length > 0">
  <button class="pagination-button-first" (click)="firstPage()" [disabled]="currentPage === 1" data-testid="first-page">
    <mat-icon>first_page</mat-icon>
  </button>
  <button class="pagination-button" (click)="previousPage()" [disabled]="currentPage === 1" data-testid="prev-page">Previous</button>
  <span data-testid="page-info">Page {{ currentPage }} of {{ totalPages }}</span>
  <button class="pagination-button" (click)="nextPage()" [disabled]="currentPage >= totalPages" data-testid="next-page">Next</button>
  <button class="pagination-button-last" (click)="lastPage()" [disabled]="currentPage >= totalPages" data-testid="last-page">
    <mat-icon>last_page</mat-icon>
  </button>
</div>
