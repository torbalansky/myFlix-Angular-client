name: E2E Tests (Playwright)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      BASE_URL: https://myflix-angular-client-torbalansky.netlify.app/

      # E2E credentials used by tests/fixtures/auth.fixture.ts
      E2E_TEST_USERNAME: ${{ secrets.E2E_TEST_USERNAME }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
      E2E_TEST_EMAIL:    ${{ secrets.E2E_TEST_EMAIL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 18.x
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          CI: true
          BASE_URL: ${{ env.BASE_URL }}
          E2E_TEST_USERNAME: ${{ env.E2E_TEST_USERNAME }}
          E2E_TEST_PASSWORD: ${{ env.E2E_TEST_PASSWORD }}
          E2E_TEST_EMAIL:    ${{ env.E2E_TEST_EMAIL }}

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Playwright traces and videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-debug-artifacts
          path: test-results/
          retention-days: 7