name: E2E Tests (Playwright)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build Angular app
      run: npm run build

    - name: Install Playwright browsers
      run: npx playwright install --with-deps

    - name: Start production server
      run: |
        npx serve dist/my-flix-angular-client -l 4200 &
        npx wait-on http://127.0.0.1:4200 --timeout 60000

    - name: Run Playwright tests
      run: npm run test:e2e
      env:
        CI: true
        BASE_URL: http://127.0.0.1:4200
        E2E_TEST_USERNAME: ${{ secrets.E2E_TEST_USERNAME }}
        E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
        E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}

    - name: Upload HTML report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-${{ matrix.node-version }}
        path: playwright-report/
        retention-days: 30

    - name: Upload Test Results (JUnit)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: junit-results-${{ matrix.node-version }}
        path: test-results/junit.xml
        retention-days: 30

    - name: Upload videos on failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: playwright-videos-${{ matrix.node-version }}
        path: test-results/
        retention-days: 7

    - name: Upload trace files on failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: playwright-traces-${{ matrix.node-version }}
        path: test-results/
        retention-days: 7

    - name: Publish test results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        files: |
          test-results/junit.xml