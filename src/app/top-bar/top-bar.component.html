<mat-toolbar class="top-bar">
  <!-- Logo Section -->
  <div class="logo-section">
    <button mat-icon-button (click)="toMovies()" class="logo-button" matTooltip="Home">
      <i class="fa-solid fa-film"></i>
      <span class="logo-text">MyFlix</span>
    </button>
  </div>

  <!-- Search and Filter Section -->
  <div class="search-section">
    <div class="search-wrapper">
      <i class="fa-solid fa-magnifying-glass search-icon"></i>
      <input
        class="search-input"
        [(ngModel)]="searchTerm"
        (input)="filterMovies()"
        placeholder="Search movies..."
        type="text"
      />
      <mat-form-field class="genre-filter">
        <mat-label>Genre</mat-label>
        <mat-select [(ngModel)]="selectedGenre" (selectionChange)="filterMovies()">
          <mat-option value="">All Genres</mat-option>
          <mat-option *ngFor="let genre of genres" [value]="genre">{{ genre }}</mat-option>
        </mat-select>
      </mat-form-field>
      <button
        mat-icon-button
        class="clear-btn"
        *ngIf="searchTerm || selectedGenre"
        (click)="clearSearch()"
        matTooltip="Clear filters"
      >
        <mat-icon>close</mat-icon>
      </button>
    </div>
  </div>

  <!-- Action Icons Section -->
  <div class="actions-section">
    <button
      mat-icon-button
      (click)="toMovies()"
      class="action-btn"
      matTooltip="Home"
    >
      <mat-icon>home</mat-icon>
    </button>
    <button
      mat-icon-button
      (click)="toProfile()"
      class="action-btn"
      matTooltip="My Profile"
    >
      <mat-icon>account_circle</mat-icon>
    </button>
    <button
      mat-icon-button
      (click)="logOut()"
      class="action-btn logout-btn"
      matTooltip="Log out"
    >
      <mat-icon>logout</mat-icon>
    </button>
  </div>
</mat-toolbar>
